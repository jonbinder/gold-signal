# Apply pending SQL migrations to production Supabase on every push to main.
# Runs in parallel with Vercel; migrations are usually fast (<30s). Idempotent when already applied.
#
# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN — Dashboard → Account → Access Tokens
#   SUPABASE_PROJECT_REF  — Project Settings → General → Reference ID (same as SUPABASE_PROJECT_ID)
#   SUPABASE_DB_PASSWORD  — Project Settings → Database → Database password

name: Supabase migrations

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: supabase-migrations-production
  cancel-in-progress: false

jobs:
  migrate:
    name: db push (production)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.98.0

      - name: Link remote project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "${{ secrets.SUPABASE_PROJECT_REF }}" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::Missing SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, or SUPABASE_DB_PASSWORD repository secrets."
            exit 1
          fi
          supabase link --project-ref "${{ secrets.SUPABASE_PROJECT_REF }}" --password "$SUPABASE_DB_PASSWORD"

      - name: Apply migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase db push

      - name: Migration summary
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: supabase migration list
