# Supabase CLI — remote migrations via `supabase db push` (CI + local after link).
# Project ref is set at link time; do not commit .supabase/ (gitignored).
# https://supabase.com/docs/guides/cli/config

project_id = "gold-signal"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323

[auth]
enabled = true

[db.migrations]
enabled = true
